  { id:"vivacity-soften", brand:"인핸싱 비바시티", name:"밀본 인핸싱 비바시티 샴푸 소픈", price:"38,000원", forTypes:["건성","민감성","정상"], forConditions:["두피 건조","두피 당김","수분 부족","각질"], desc:"두피에 부드러운 수분감을 더해주는 소픈 타입 샴푸", tag:"수분 · 소픈", color:"#a78bfa" },
  { id:"carbonated", brand:"글로벌밀본", name:"밀본 카보네이티드 샴푸", price:"45,000원", forTypes:["지성","복합성","정상"], forConditions:["모공 막힘","두피 노폐물","과다 피지","두피 열감"], desc:"탄산 성분이 모공 속 노폐물을 효과적으로 제거하는 스파 샴푸", tag:"탄산 클렌징", color:"#fb923c" },
  { id:"purifying", brand:"글로벌밀본", name:"밀본 퓨어리파잉 젤 샴푸", price:"28,000원", forTypes:["지성","복합성"], forConditions:["과다 피지","비듬","각질","두피 냄새","끈적임"], desc:"젤 타입으로 피지와 비듬을 강력하게 세정하는 퓨리파잉 샴푸", tag:"강력 세정", color:"#f87171" },
];

const PROMPT = `당신은 전문 두피 분석 전문가입니다. 제공된 두피 사진을 분석하여 진단해주세요.
반드시 아래 JSON 형식으로만 응답하세요 (다른 텍스트, 마크다운 없이 순수 JSON만):
{"score":75,"type":"지성","conditions":["과다 피지","모공 막힘"],"summary":"두피 상태 요약 2~3문장","recommendedProductIds":["presedia"],"recommendIngredients":["살리실산","징크피리치온"],"avoidIngredients":["강한 설페이트","실리콘"],"cares":[{"title":"케어명","description":"방법","frequency":"주3회","icon":"🧴"}],"lifestyle":["생활습관 조언"]}
제품ID목록: presedia(오주아프리세디아/지성피지), fortis(오주아포르티스/모근강화), moistcalm(오주아모이스트캄/건성보습), agingspa(오주아에이징스파/노화), agingspa-clear(오주아에이징스파클리어폼/딥클렌징), osenam(오주아오세남/민감염증), growsive(오주아그로우시브/모발성장), vivacity-refine(비바시티리파인/지성), vivacity-soften(비바시티소픈/건성), carbonated(밀본카보네이티드/탄산), purifying(밀본퓨어리파잉/강력세정)
두피 상태에 맞는 제품 1~3개를 recommendedProductIds에 넣어주세요.`;

// ── State ──
let state = { mode:"home", photos:[], curIdx:0, analyzing:false, result:null, error:null, tab:"overview" };

function setState(patch) {
  state = { ...state, ...patch };
  render();
}

// ── Utils ──
const sc = s => s>=80?"#4ade80":s>=60?"#facc15":s>=40?"#fb923c":"#f87171";
const sl = s => s>=80?"매우 건강":s>=60?"양호":s>=40?"주의 필요":"집중 케어 필요";
const AC = "#7c5cfc", AC2 = "#a78bfa", BG = "#0c0c14", CARD = "rgba(255,255,255,0.03)", BD = "rgba(255,255,255,0.07)";

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.flat().forEach(c => c != null && e.appendChild(typeof c === "string" ? document.createTextNode(c) : c));
  return e;
}

function css(obj) { return obj; }

// ── File handling ──
function addPhoto(file) {
  if (!file || !file.type.startsWith("image/") || state.photos.length >= 8) return;
  const url = URL.createObjectURL(file);
  const reader = new FileReader();
  reader.onload = e => {
    const base64 = e.target.result.split(",")[1];
    setState({ photos: [...state.photos, { url, base64, mediaType: file.type }], mode:"capture" });
  };
  reader.readAsDataURL(file);
}

function removePhoto(idx) {
  const next = state.photos.filter((_,i) => i !== idx);
  setState({ photos: next, curIdx: Math.min(state.curIdx, Math.max(0, next.length-1)) });
}

// ── Analyze ──
async function analyze() {
  if (!state.photos.length) return;
  setState({ analyzing: true, error: null });
  try {
    const parts = [
      ...state.photos.map(p => ({ inlineData: { mimeType: p.mediaType, data: p.base64 } })),
      { text: PROMPT }
    ];
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ contents: [{ parts }] })
    });
    const data = await res.json();
    let text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
    text = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(text);
    parsed.recommendedProducts = (parsed.recommendedProductIds || [])
      .map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
    setState({ result: parsed, mode: "result", tab: "overview", analyzing: false });
  } catch(e) {
    setState({ error: "분석 중 오류가 발생했습니다. 다시 시도해주세요.", analyzing: false });
  }
}

// ── Render ──
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  app.appendChild(buildView());
}

function buildView() {
  if (state.mode === "home") return buildHome();
  if (state.mode === "capture") return buildCapture();
  if (state.mode === "result") return buildResult();
  return el("div", {}, "");
}

// ── HOME ──
function buildHome() {
  const wrap = el("div", { style: css({ minHeight:"100vh", background:BG, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"24px", position:"relative" }) });
  const glow = el("div", { style: css({ position:"fixed", inset:0, background:`radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,92,252,0.12) 0%, transparent 70%)`, pointerEvents:"none" }) });
  wrap.appendChild(glow);

  const inner = el("div", { style: css({ position:"relative", zIndex:1, textAlign:"center", maxWidth:"480px", width:"100%" }) });

  const badge = el("div", { style: css({ display:"inline-flex", alignItems:"center", fontSize:"10px", letterSpacing:"0.2em", color:AC2, fontWeight:700, padding:"5px 14px", border:`1px solid ${AC2}40`, borderRadius:"20px", marginBottom:"16px" }) }, "AI SCALP DIAGNOSIS");

  const title = el("h1", { style: css({ fontSize:"clamp(26px,6vw,40px)", fontWeight:800, margin:"0 0 10px", background:`linear-gradient(135deg,#f0ede8,${AC2})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }) }, "두피 AI 진단 리포트");

  const desc = el("p", { style: css({ color:"#5a5868", fontSize:"14px", marginBottom:"40px", lineHeight:1.7 }) }, "두피 사진을 최대 8장 촬영하거나 업로드하면 AI가 종합 분석 후 맞춤 제품을 추천해드려요");

  const camInput = el("input", { type:"file", accept:"image/*", capture:"environment", style:"display:none", id:"cam-input" });
  const fileInput = el("input", { type:"file", accept:"image/*", multiple:"true", style:"display:none", id:"file-input" });
  camInput.addEventListener("change", e => addPhoto(e.target.files[0]));
  fileInput.addEventListener("change", e => Array.from(e.target.files).slice(0,8).forEach(f => addPhoto(f)));

  const btnCam = el("button", { style: css({ padding:"18px", borderRadius:"16px", background:`linear-gradient(135deg,${AC},${AC2})`, border:"none", color:"#fff", fontSize:"16px", fontWeight:700, cursor:"pointer", boxShadow:`0 6px 28px ${AC}50`, width:"100%", marginBottom:"12px" }),
    onClick: () => camInput.click() }, "📷  카메라로 촬영하기");

  const btnFile = el("button", { style: css({ padding:"16px", borderRadius:"16px", background:CARD, border:`1px solid ${BD}`, color:"#c8c4d8", fontSize:"15px", fontWeight:600, cursor:"pointer", width:"100%" }),
    onClick: () => fileInput.click() }, "🖼  사진 업로드하기");

  const tip = el("p", { style: css({ color:"#3a3848", fontSize:"12px", marginTop:"20px" }) }, "최대 8장까지 • 여러 각도 촬영 권장");

  inner.append(badge, title, desc, camInput, fileInput, btnCam, btnFile, tip);
  wrap.appendChild(inner);
  return wrap;
}

// ── CAPTURE ──
function buildCapture() {
  const wrap = el("div", { style: css({ minHeight:"100vh", background:BG }) });
  const glow = el("div", { style: css({ position:"fixed", inset:0, background:`radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,92,252,0.08) 0%, transparent 70%)`, pointerEvents:"none" }) });
  wrap.appendChild(glow);

  const inner = el("div", { style: css({ position:"relative", zIndex:1, maxWidth:"680px", margin:"0 auto", padding:"24px 16px 80px" }) });

  // Header
  const header = el("div", { style: css({ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"24px" }) });
  const backBtn = el("button", { style: css({ background:"none", border:"none", color:"#7a7488", cursor:"pointer", fontSize:"13px" }), onClick: () => setState({ mode:"home", photos:[], curIdx:0 }) }, "← 처음으로");
  const countBadge = el("span", { style: css({ fontSize:"13px", color:"#5a5868" }) }, `사진 ${state.photos.length}/8장`);
  header.append(backBtn, countBadge, el("span", {}));
  inner.appendChild(header);

  // Main viewer
  const viewer = el("div", { style: css({ position:"relative", borderRadius:"20px", overflow:"hidden", background:"#080810", aspectRatio:"4/3", marginBottom:"16px", boxShadow:"0 8px 40px rgba(0,0,0,0.6)" }) });
  if (state.photos.length > 0) {
    const img = el("img", { src: state.photos[state.curIdx]?.url, style: css({ width:"100%", height:"100%", objectFit:"cover" }) });
    viewer.appendChild(img);
  }
  if (state.photos.length > 1) {
    const prevBtn = el("button", { style: css({ position:"absolute", left:"12px", top:"50%", transform:"translateY(-50%)", background:"rgba(0,0,0,0.5)", border:"none", borderRadius:"50%", width:"36px", height:"36px", color:"#fff", fontSize:"18px", cursor:"pointer", opacity: state.curIdx===0?0.3:1 }),
      onClick: () => setState({ curIdx: Math.max(0, state.curIdx-1) }) }, "‹");
    const nextBtn = el("button", { style: css({ position:"absolute", right:"12px", top:"50%", transform:"translateY(-50%)", background:"rgba(0,0,0,0.5)", border:"none", borderRadius:"50%", width:"36px", height:"36px", color:"#fff", fontSize:"18px", cursor:"pointer", opacity: state.curIdx===state.photos.length-1?0.3:1 }),
      onClick: () => setState({ curIdx: Math.min(state.photos.length-1, state.curIdx+1) }) }, "›");
    viewer.append(prevBtn, nextBtn);
  }
  const idxBadge = el("div", { style: css({ position:"absolute", top:"12px", right:"12px", background:"rgba(0,0,0,0.6)", borderRadius:"12px", padding:"4px 10px", fontSize:"12px", color:"#fff" }) }, `${state.curIdx+1} / ${state.photos.length}`);
  const delBtn = el("button", { style: css({ position:"absolute", top:"12px", left:"12px", background:"rgba(248,113,113,0.85)", border:"none", borderRadius:"50%", width:"32px", height:"32px", color:"#fff", fontSize:"14px", cursor:"pointer" }),
    onClick: () => removePhoto(state.curIdx) }, "✕");
  viewer.append(idxBadge, delBtn);
  inner.appendChild(viewer);

  // Thumbnails
  const thumbs = el("div", { style: css({ display:"flex", gap:"8px", overflowX:"auto", paddingBottom:"8px", marginBottom:"20px" }) });
  state.photos.forEach((p, i) => {
    const th = el("div", { style: css({ flexShrink:0, width:"60px", height:"60px", borderRadius:"10px", overflow:"hidden", border:`2px solid ${i===state.curIdx?AC2:"transparent"}`, cursor:"pointer", opacity:i===state.curIdx?1:0.6 }),
      onClick: () => setState({ curIdx: i }) });
    th.appendChild(el("img", { src: p.url, style: css({ width:"100%", height:"100%", objectFit:"cover" }) }));
    thumbs.appendChild(th);
  });
  if (state.photos.length < 8) {
    const addThumb = el("div", { style: css({ flexShrink:0, width:"60px", height:"60px", borderRadius:"10px", border:`2px dashed ${AC2}50`, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:AC2, fontSize:"22px" }),
      onClick: () => document.getElementById("cap-input")?.click() }, "+");
    thumbs.appendChild(addThumb);
  }
  inner.appendChild(thumbs);

  // Tip
  const tip = el("div", { style: css({ background:`${AC}10`, border:`1px solid ${AC}30`, borderRadius:"14px", padding:"12px 16px", marginBottom:"20px" }) });
  tip.appendChild(el("p", { style: css({ color:AC2, fontSize:"12px", margin:0, lineHeight:1.6 }) }, "💡 촬영 팁: 두피 전체, 정수리, 측면, 뒷부분 등 여러 각도에서 찍을수록 더 정확해요"));

  if (state.photos.length < 8) {

    const fileInput2 = el("input", { type:"file", accept:"image/*", multiple:"true", style:"display:none", id:"file-input2" });
    capInput2.addEventListener("change", e => addPhoto(e.target.files[0]));
    fileInput2.addEventListener("change", e => Array.from(e.target.files).slice(0, 8-state.photos.length).forEach(f => addPhoto(f)));

    const b2 = el("button", { style: css({ flex:1, padding:"13px", borderRadius:"12px", background:CARD, border:`1px solid ${BD}`, color:"#c8c4d8", fontSize:"13px", fontWeight:600, cursor:"pointer" }), onClick: () => fileInput2.click() }, "🖼 추가 업로드");
    addRow.append(capInput2, fileInput2, b1, b2);
    inner.appendChild(addRow);
  }

  // Analyze button
  const analyzeBtn = el("button", {
    style: css({ width:"100%", padding:"18px", borderRadius:"16px", background: state.analyzing?`rgba(124,92,252,0.2)`:`linear-gradient(135deg,${AC},${AC2})`, border:"none", color:"#fff", fontSize:"16px", fontWeight:700, cursor: state.analyzing?"not-allowed":"pointer", boxShadow: state.analyzing?"none":`0 6px 28px ${AC}50` }),

    inner.appendChild(errBox);
  }

  wrap.appendChild(inner);
  return wrap;
}

  const r = state.result;
  const wrap = el("div", { style: css({ minHeight:"100vh", background:BG }) });
  const glow = el("div", { style: css({ position:"fixed", inset:0, background:`radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,92,252,0.08) 0%, transparent 70%)`, pointerEvents:"none" }) });
  wrap.appendChild(glow);

  const inner = el("div", { style: css({ position:"relative", zIndex:1, maxWidth:"680px", margin:"0 auto", padding:"24px 16px 60px" }), class:"fade" });

  // Header
  const header = el("div", { style: css({ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"24px" }) });
  const backBtn = el("button", { style: css({ background:"none", border:"none", color:"#7a7488", cursor:"pointer", fontSize:"13px" }), onClick: () => setState({ mode:"capture" }) }, "← 사진으로");
  const badge = el("span", { style: css({ fontSize:"12px", color:"#5a5868" }) }, `📷 ${state.photos.length}장 분석 완료`);
  const resetBtn = el("button", { style: css({ background:"none", border:`1px solid ${BD}`, color:"#a8a4b8", cursor:"pointer", fontSize:"12px", padding:"5px 12px", borderRadius:"10px" }), onClick: () => setState({ mode:"home", photos:[], curIdx:0, result:null, error:null }) }, "처음으로");
  header.append(backBtn, badge, resetBtn);
  inner.appendChild(header);

  // Score card
  const scoreCard = el("div", { style: css({ background:`linear-gradient(135deg,rgba(124,92,252,0.1),rgba(167,139,250,0.05))`, border:`1px solid ${AC}30`, borderRadius:"22px", padding:"28px 24px", marginBottom:"16px", display:"flex", alignItems:"center", gap:"24px" }) });
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("width", "90"); svg.setAttribute("height", "90"); svg.setAttribute("viewBox", "0 0 100 100");
  svg.style.flexShrink = "0";
  const bgCircle = document.createElementNS(svgNS, "circle");
  bgCircle.setAttribute("cx","50"); bgCircle.setAttribute("cy","50"); bgCircle.setAttribute("r","44");
  bgCircle.setAttribute("fill","none"); bgCircle.setAttribute("stroke","rgba(255,255,255,0.06)"); bgCircle.setAttribute("stroke-width","9");
  const fgCircle = document.createElementNS(svgNS, "circle");
  fgCircle.setAttribute("cx","50"); fgCircle.setAttribute("cy","50"); fgCircle.setAttribute("r","44");
  fgCircle.setAttribute("fill","none"); fgCircle.setAttribute("stroke", sc(r.score)); fgCircle.setAttribute("stroke-width","9");
  fgCircle.setAttribute("stroke-dasharray", `${2.76*r.score} 276`); fgCircle.setAttribute("stroke-linecap","round");
  fgCircle.setAttribute("transform","rotate(-90 50 50)");
  const t1 = document.createElementNS(svgNS, "text");
  t1.setAttribute("x","50"); t1.setAttribute("y","46"); t1.setAttribute("text-anchor","middle");
  t1.setAttribute("fill", sc(r.score)); t1.setAttribute("font-size","22"); t1.setAttribute("font-weight","800");
  t1.textContent = r.score;
  const t2 = document.createElementNS(svgNS, "text");
  t2.setAttribute("x","50"); t2.setAttribute("y","62"); t2.setAttribute("text-anchor","middle");
  t2.setAttribute("fill","#555"); t2.setAttribute("font-size","9"); t2.textContent = "/ 100";
  svg.append(bgCircle, fgCircle, t1, t2);

  const scoreInfo = el("div", { style: css({ flex:1 }) });
  const badges = el("div", { style: css({ display:"flex", flexWrap:"wrap", gap:"6px", marginBottom:"10px" }) });
  badges.append(
    el("span", { style: css({ fontSize:"11px", fontWeight:700, color:sc(r.score), background:`${sc(r.score)}18`, padding:"3px 10px", borderRadius:"20px" }) }, sl(r.score)),
    el("span", { style: css({ fontSize:"11px", fontWeight:700, color:AC2, background:`${AC}18`, padding:"3px 10px", borderRadius:"20px" }) }, `${r.type} 두피`)
  );
  const summary = el("p", { style: css({ color:"#a8a4b8", fontSize:"13px", lineHeight:1.7, margin:0 }) }, r.summary);
  scoreInfo.append(badges, summary);
  scoreCard.append(svg, scoreInfo);
  inner.appendChild(scoreCard);

  // Tabs
  const tabs = [["overview","📊 종합 진단"],["products","🛍 추천 제품"],["care","💊 케어 처방"]];
  const tabBar = el("div", { style: css({ display:"flex", gap:"6px", marginBottom:"16px", background:CARD, border:`1px solid ${BD}`, borderRadius:"14px", padding:"5px" }) });
  tabs.forEach(([id, label]) => {
    const btn = el("button", { style: css({ flex:1, padding:"10px 4px", borderRadius:"10px", border:"none", background: state.tab===id?`linear-gradient(135deg,${AC},${AC2})`:"transparent", color: state.tab===id?"#fff":"#6a6478", fontSize:"clamp(11px,2.5vw,13px)", fontWeight:700, cursor:"pointer", whiteSpace:"nowrap" }),
      onClick: () => setState({ tab: id }) }, label);
    tabBar.appendChild(btn);
  });
  inner.appendChild(tabBar);

  // Tab content
  const content = el("div", { class:"fade" });

  if (state.tab === "overview") {
    // Conditions
    if (r.conditions?.length) {
      const card = el("div", { style: css({ background:CARD, border:`1px solid ${BD}`, borderRadius:"18px", padding:"18px 20px", marginBottom:"12px" }) });
      card.appendChild(sectionTitle("발견된 두피 상태"));
      const chips = el("div", { style: css({ display:"flex", flexWrap:"wrap", gap:"6px" }) });
      r.conditions.forEach(c => chips.appendChild(el("span", { style: css({ padding:"5px 12px", borderRadius:"20px", fontSize:"12px", background:`${AC}12`, border:`1px solid ${AC}30`, color:AC2 }) }, `⚠ ${c}`)));
      card.appendChild(chips);
      content.appendChild(card);
    }
    // Ingredients
    const ingCard = el("div", { style: css({ background:CARD, border:`1px solid ${BD}`, borderRadius:"18px", padding:"18px 20px", marginBottom:"12px" }) });
    ingCard.appendChild(sectionTitle("성분 가이드"));
    const grid = el("div", { style: css({ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"12px" }) });
    const goodBox = el("div", { style: css({ padding:"12px 14px", borderRadius:"12px", background:"rgba(74,222,128,0.06)", border:"1px solid rgba(74,222,128,0.15)" }) });
    goodBox.appendChild(el("div", { style: css({ fontSize:"11px", color:"#4ade80", fontWeight:700, marginBottom:"8px" }) }, "✓ 추천 성분"));
    r.recommendIngredients?.forEach(s => goodBox.appendChild(el("div", { style: css({ fontSize:"12px", color:"#a8d8b0", marginBottom:"4px" }) }, `• ${s}`)));
    const badBox = el("div", { style: css({ padding:"12px 14px", borderRadius:"12px", background:"rgba(248,113,113,0.06)", border:"1px solid rgba(248,113,113,0.15)" }) });
    badBox.appendChild(el("div", { style: css({ fontSize:"11px", color:"#f87171", fontWeight:700, marginBottom:"8px" }) }, "✗ 피할 성분"));
    r.avoidIngredients?.forEach(s => badBox.appendChild(el("div", { style: css({ fontSize:"12px", color:"#d8a8a8", marginBottom:"4px" }) }, `• ${s}`)));
    grid.append(goodBox, badBox);
    ingCard.appendChild(grid);
    content.appendChild(ingCard);
    // Lifestyle
    if (r.lifestyle?.length) {
      const lCard = el("div", { style: css({ background:CARD, border:`1px solid ${BD}`, borderRadius:"18px", padding:"18px 20px" }) });
      lCard.appendChild(sectionTitle("생활 습관 조언"));
      r.lifestyle.forEach((l,i) => {
        const row = el("div", { style: css({ display:"flex", gap:"10px", marginBottom: i<r.lifestyle.length-1?"10px":"0" }) });
        row.append(el("span", { style: css({ color:AC2, fontWeight:700, fontSize:"12px", flexShrink:0 }) }, `0${i+1}`), el("span", { style: css({ color:"#9490a4", fontSize:"13px", lineHeight:1.6 }) }, l));
        lCard.appendChild(row);
      });
      content.appendChild(lCard);
    }
  }

  if (state.tab === "products") {
    if (r.recommendedProducts?.length) {
      r.recommendedProducts.forEach((p,i) => {
        const card = el("div", { style: css({ background: i===0?`linear-gradient(135deg,rgba(124,92,252,0.1),rgba(167,139,250,0.05))`:CARD, border: i===0?`1px solid ${AC}35`:`1px solid ${BD}`, borderRadius:"18px", padding:"18px", marginBottom:"12px", display:"flex", gap:"14px", alignItems:"flex-start" }) });
        const icon = el("div", { style: css({ width:"42px", height:"42px", borderRadius:"12px", background: i===0?`${AC}25`:"rgba(255,255,255,0.05)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"18px", flexShrink:0 }) }, i===0?"🥇":i===1?"🥈":"🥉");
        const info = el("div", { style: css({ flex:1 }) });
        info.appendChild(el("div", { style: css({ fontSize:"10px", color:"#6b6478", fontWeight:600, marginBottom:"4px" }) }, p.brand));
        const nameRow = el("div", { style: css({ display:"flex", alignItems:"center", gap:"8px", flexWrap:"wrap", marginBottom:"5px" }) });
        nameRow.append(
          el("span", { style: css({ fontSize:"15px", fontWeight:700, color:"#f0ede8" }) }, p.name),
          el("span", { style: css({ fontSize:"10px", padding:"2px 9px", borderRadius:"10px", fontWeight:700, background:`${p.color}18`, color:p.color, border:`1px solid ${p.color}30` }) }, p.tag)
        );
        info.appendChild(nameRow);
        info.appendChild(el("p", { style: css({ color:"#7a7488", fontSize:"12px", lineHeight:1.6, margin:"0 0 6px" }) }, p.desc));
        info.appendChild(el("span", { style: css({ fontSize:"13px", fontWeight:700, color:AC2 }) }, p.price));
        card.append(icon, info);
        content.appendChild(card);
      });
    } else {
      content.appendChild(el("div", { style: css({ textAlign:"center", color:"#5a5868", padding:"40px 0" }) }, "추천 제품 없음"));
    }
  }

  if (state.tab === "care") {
    r.cares?.forEach(care => {
      const card = el("div", { style: css({ background:CARD, border:`1px solid ${BD}`, borderRadius:"16px", padding:"15px 17px", marginBottom:"10px", display:"flex", gap:"12px" }) });
      const icon = el("div", { style: css({ fontSize:"24px", width:"42px", height:"42px", display:"flex", alignItems:"center", justifyContent:"center", background:"rgba(255,255,255,0.04)", borderRadius:"11px", flexShrink:0 }) }, care.icon);
      const info = el("div", { style: css({ flex:1 }) });
      info.appendChild(el("div", { style: css({ fontSize:"13px", fontWeight:700, color:"#e8e4f0", marginBottom:"4px" }) }, care.title));
      info.appendChild(el("p", { style: css({ color:"#7a7488", fontSize:"12px", lineHeight:1.6, margin:"0 0 5px" }) }, care.description));
      info.appendChild(el("span", { style: css({ fontSize:"11px", color:AC2, fontWeight:600 }) }, `🗓 ${care.frequency}`));
      card.append(icon, info);
      content.appendChild(card);
    });
  }

  inner.appendChild(content);
  inner.appendChild(el("p", { style: css({ textAlign:"center", color:"#252330", fontSize:"11px", marginTop:"24px" }) }, "본 진단은 참고용이며 전문 의료 상담을 대체하지 않습니다"));
  wrap.appendChild(inner);
  return wrap;
}

function sectionTitle(text) {
  return el("h3", { style: css({ fontSize:"10px", letterSpacing:"0.2em", color:AC2, textTransform:"uppercase", margin:"0 0 12px", fontWeight:700 }) }, text);
}

// Init
render();
</script>
</body>
</html>
